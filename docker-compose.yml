services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learning-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: learning_agent
      POSTGRES_USER: learning_agent
      POSTGRES_PASSWORD: learning_agent
    ports:
      - '5432:5432'
    volumes:
      - learning-agent-postgres:/var/lib/postgresql/data

volumes:
  learning-agent-postgres:
